<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/db.js"></script>
<script src="js/engine.js"></script>
<script>

let allPlayers = [], allMatches = [], seasonStandings = [], weekStandings = [];
let activeSeason = null, cfg = null;
let activePlayerId = null;

function buildBreakdownForPlayer(playerId) {
  const player = allPlayers.find(p => p.id === playerId);
  if (!player) return;

  const content = document.getElementById('breakdown-content');

  // Get season row from DB (source of truth for totals)
  const sznRow   = seasonStandings.find(r => r.player_id === playerId) || {};
  const totalPts = parseFloat(sznRow.total    || 0);
  const bonusPts = parseFloat(sznRow.bonus    || 0);
  const dogPts   = parseFloat(sznRow.underdog || 0);
  const poolWins = parseInt(sznRow.pool_wins    || 0);
  const bowlWins = parseInt(sznRow.bowling_wins || 0);
  const golfWins = parseInt(sznRow.golf_wins    || 0);
  const totalWins = poolWins + bowlWins + golfWins;

  // Get all non-deleted matches involving this player, sorted oldest first
  const playerMatches = allMatches
    .filter(m => !m.deleted && (m.match_placements||[]).some(p => p.player_id === playerId))
    .sort((a, b) => new Date(a.match_date||a.created_at) - new Date(b.match_date||b.created_at));

  // Replay matches through engine to get real per-match point breakdowns
  const allPlayerIds = allPlayers.map(p => p.id);
  const processedSoFar = [];

  // Build running season totals for rank calculation (same as engine does)
  const runningTotals = {};
  allPlayerIds.forEach(id => { runningTotals[id] = 0; });

  // Pre-populate with points from matches BEFORE this player's first match
  // (simplified: just use current season standings as baseline rank approximation)
  // For accuracy, we replay all matches in order
  const allSortedMatches = allMatches
    .filter(m => !m.deleted)
    .sort((a, b) => new Date(a.match_date||a.created_at) - new Date(b.match_date||b.created_at));

  const matchBreakdowns = {}; // matchId -> { pts, lines }

  // Replay all matches to get accurate points per match
  const replayTotals = {};
  allPlayerIds.forEach(id => { replayTotals[id] = 0; });

  for (const match of allSortedMatches) {
    // Build rank map from running totals at this point in time
    const standingsArr = allPlayerIds.map(id => ({ player_id: id, total: replayTotals[id] }));
    const rankMap = Engine.buildRankMap(standingsArr, allPlayers);
    const underdogIds = Engine.getUnderdogIds(standingsArr, allPlayers);

    const cfgWithKing = { ...cfg };
    const kingPlayer  = allPlayers.find(p => p.name === cfg.currentKing);
    cfgWithKing._kingId = kingPlayer?.id || null;

    // Map is_winner from DB onto placements
    const placements = (match.match_placements || [])
      .sort((a,b) => a.position - b.position)
      .map(p => ({ ...p, isWinner: p.is_winner !== null && p.is_winner !== undefined ? p.is_winner : null }));

    const pts = Engine.calcMatch(
      { ...match, match_placements: placements },
      cfgWithKing, rankMap, underdogIds, processedSoFar, allPlayerIds
    );

    // Store breakdown for this match
    matchBreakdowns[match.id] = pts;

    // Update running totals
    allPlayerIds.forEach(id => {
      const d = pts[id];
      if (d) replayTotals[id] += round2(d.pool + d.bowling + d.golf + d.bonus + d.underdog);
    });

    processedSoFar.push(match);
  }

  // Now build the match cards using real calculated points
  const matchCards = playerMatches.map(match => {
    const pl      = (match.match_placements||[]).sort((a,b) => a.position - b.position);
    const myPlacement = pl.find(p => p.player_id === playerId);
    if (!myPlacement) return '';

    const sport  = match.sport;
    const others = pl.filter(p => p.player_id !== playerId).map(p => p.players?.name).filter(Boolean);
    const earned = matchBreakdowns[match.id]?.[playerId] || { pool:0, bowling:0, golf:0, bonus:0, underdog:0 };

    const sportPts  = round2((earned.pool || 0) + (earned.bowling || 0) + (earned.golf || 0));
    const bonusAmt  = round2(earned.bonus    || 0);
    const dogAmt    = round2(earned.underdog || 0);
    const matchTotal = round2(sportPts + bonusAmt + dogAmt);

    if (matchTotal === 0) return ''; // skip matches where player earned nothing

    // Build breakdown lines
    const lines = [];

    // Base sport points
    const sportKey = sport.toLowerCase();
    const rawSportPts = round2((earned[sportKey] || 0) - bonusAmt - dogAmt);
    // Derive base points before multipliers
    const isWinner2v1 = myPlacement.is_winner === true;
    const myPos = myPlacement.position;
    const didWin = sport === 'Pool'
      ? (isWinner2v1 || myPos === 1)
      : myPos === 1;
    const is2nd = !didWin && myPos === 2 && sport !== 'Pool';

    if (didWin) {
      const basePts = sport === 'Pool' ? cfg.poolWinPts : cfg.firstPts;
      lines.push({ label: `${sport} ${sport === 'Pool' ? 'win' : '1st place'} — base`, val: fmtPts(basePts) });

      // Upset multiplier — if sportPts > base, there was an upset bonus
      const totalSportBeforeMultipliers = round2(earned[sportKey] || 0);
      const upsetBonus = round2(totalSportBeforeMultipliers - basePts - bonusAmt - dogAmt);
      if (upsetBonus > 0.01) {
        lines.push({ label: `Upset bonus`, val: '+' + fmtPts(upsetBonus), pos: true });
      }
    } else if (is2nd) {
      lines.push({ label: `${sport} 2nd place`, val: fmtPts(cfg.secondPts) });
    } else {
      lines.push({ label: `No points earned`, val: '0' });
    }

    if (dogAmt > 0) {
      lines.push({ label: `Underdog multiplier ×${cfg.underdogMultiplier}`, val: '+' + fmtPts(dogAmt), pos: true });
    }
    if (bonusAmt > 0) {
      lines.push({ label: `Bonus (king slay / upset)`, val: '+' + fmtPts(bonusAmt), pos: true });
    }

    const linesHtml = lines.map(l => `
      <div class="breakdown-calc-row">
        <span>${l.label}</span>
        <span class="${l.pos ? 'pos' : ''}">${l.val}</span>
      </div>`).join('');

    return `
      <div class="match-breakdown-item" onclick="this.classList.toggle('expanded')">
        <div class="match-breakdown-top">
          <div class="match-sport-badge ${sport.toLowerCase()}" style="flex-shrink:0">${SPORT_EMOJI[sport]||'🎯'}</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;font-size:14px">${sport}${match.pool_mode?' · '+match.pool_mode:''}</div>
            <div style="font-size:12px;color:var(--muted)">
              Wk ${match.week} · ${fmtDate(match.match_date||match.created_at)}
              ${others.length ? '· vs ' + others.join(', ') : ''}
            </div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-family:var(--font-display);font-size:20px;color:var(--accent-dark)">+${fmtPts(matchTotal)}</div>
            <div style="font-size:11px;color:var(--muted)">pts</div>
          </div>
        </div>
        <div class="match-breakdown-detail">
          ${linesHtml}
          <div class="breakdown-calc-row total">
            <span>Match total</span>
            <span>${fmtPts(matchTotal)} pts</span>
          </div>
          <div style="font-size:11px;color:var(--muted);margin-top:8px">Tap to collapse</div>
        </div>
      </div>`;
  }).filter(Boolean).join('');

  content.innerHTML = `
    <div class="breakdown-header">
      <div class="breakdown-stat">
        <div class="breakdown-stat-val">${fmtPts(totalPts)}</div>
        <div class="breakdown-stat-label">Total Points</div>
      </div>
      <div class="breakdown-stat">
        <div class="breakdown-stat-val">${totalWins}</div>
        <div class="breakdown-stat-label">Total Wins</div>
      </div>
      <div class="breakdown-stat">
        <div class="breakdown-stat-val">${poolWins}</div>
        <div class="breakdown-stat-label">🎱 Pool Wins</div>
      </div>
      <div class="breakdown-stat">
        <div class="breakdown-stat-val">${bowlWins}</div>
        <div class="breakdown-stat-label">🎳 Bowl Wins</div>
      </div>
      <div class="breakdown-stat">
        <div class="breakdown-stat-val">${golfWins}</div>
        <div class="breakdown-stat-label">⛳ Golf Wins</div>
      </div>
      <div class="breakdown-stat">
        <div class="breakdown-stat-val">${fmtPts(bonusPts)}</div>
        <div class="breakdown-stat-label">Bonus Pts</div>
      </div>
      <div class="breakdown-stat">
        <div class="breakdown-stat-val">${fmtPts(dogPts)}</div>
        <div class="breakdown-stat-label">Underdog Pts</div>
      </div>
    </div>

    <div class="section-label">Match by Match</div>
    ${playerMatches.length
      ? matchCards
      : '<div class="empty"><div class="empty-icon">🎯</div><div class="empty-text">No matches yet</div></div>'
    }`;
}

async function init() {
  try {
    const [cfgData, season, players] = await Promise.all([DB.getConfig(), DB.getActiveSeason(), DB.getPlayers()]);
    cfg           = cfgData;
    activeSeason  = season;
    allPlayers    = players;

    const [szn, matches] = await Promise.all([
      DB.getSeasonStandings(season.id),
      DB.getAllMatchesDesc(season.id),
    ]);
    seasonStandings = szn;
    allMatches      = matches;

    // Build player tabs
    const tabBar = document.getElementById('player-tabs');
    tabBar.innerHTML = players.map(p => {
      const photoHtml = p.photo_url
        ? `<div class="tab-avatar"><img src="${p.photo_url}" onerror="this.parentNode.innerHTML='${initials(p.name)}'"></div>`
        : `<div class="tab-avatar">${initials(p.name)}</div>`;
      return `<button class="player-tab" data-id="${p.id}">${photoHtml}${p.name}</button>`;
    }).join('');

    tabBar.addEventListener('click', e => {
      const tab = e.target.closest('.player-tab');
      if (!tab) return;
      tabBar.querySelectorAll('.player-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      activePlayerId = tab.dataset.id;
      buildBreakdownForPlayer(activePlayerId);
    });

    // Select first player by default
    if (players.length) {
      activePlayerId = players[0].id;
      tabBar.querySelector('.player-tab')?.classList.add('active');
      buildBreakdownForPlayer(activePlayerId);
    }

    document.getElementById('loader').classList.add('hidden');
    const main = document.getElementById('main');
    main.style.opacity = '1'; main.style.transition = 'opacity 0.4s';
  } catch (err) {
    document.getElementById('loader').innerHTML =
      `<div style="text-align:center;padding:40px"><div style="font-size:32px">⚠️</div><div style="margin-top:12px">${err.message}</div></div>`;
  }
}
init();

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') init();
});
window.addEventListener('focus', init);
</script>
