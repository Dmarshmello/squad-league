<div class="toast-container" id="toasts"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script src="js/engine.js"></script>
<script>

let allPlayers = [], allMatchesSorted = [], seasonStandings = [];
let activeSeason = null, cfg = null;
let activePlayerId = null;
let matchBreakdowns = {}; // matchId -> { playerId -> delta }

// Replay all matches through engine to get per-match point breakdowns
function replayAllMatches() {
  const allPlayerIds = allPlayers.map(p => p.id);
  const runningTotals = {};
  allPlayerIds.forEach(id => { runningTotals[id] = 0; });

  const processedSoFar = [];
  matchBreakdowns = {};

  for (const match of allMatchesSorted) {
    if (match.deleted) continue;

    const standingsArr = allPlayerIds.map(id => ({ player_id: id, total: runningTotals[id] }));
    const rankMap      = Engine.buildRankMap(standingsArr, allPlayers);
    const underdogIds  = Engine.getUnderdogIds(standingsArr, allPlayers);

    const cfgNow = { ...cfg };
    if (cfg.currentKing) {
      const kp = allPlayers.find(p => p.name === cfg.currentKing);
      cfgNow._kingId = kp ? kp.id : null;
    }

    const pts = Engine.calcMatch(match, cfgNow, rankMap, underdogIds, processedSoFar, allPlayerIds);
    matchBreakdowns[match.id] = pts;

    // Update running totals
    allPlayerIds.forEach(id => {
      const d = pts[id];
      if (d) runningTotals[id] += round2(d.pool + d.bowling + d.golf + d.bonus + d.underdog);
    });

    processedSoFar.push(match);
  }
}

function buildBreakdownForPlayer(playerId) {
  const player  = allPlayers.find(p => p.id === playerId);
  if (!player) return;
  const content = document.getElementById('breakdown-content');

  // Totals from DB (source of truth)
  const sznRow   = seasonStandings.find(r => r.player_id === playerId) || {};
  const totalPts = parseFloat(sznRow.total    || 0);
  const bonusPts = parseFloat(sznRow.bonus    || 0);
  const dogPts   = parseFloat(sznRow.underdog || 0);
  const poolWins = parseInt(sznRow.pool_wins    || 0);
  const bowlWins = parseInt(sznRow.bowling_wins || 0);
  const golfWins = parseInt(sznRow.golf_wins    || 0);

  // Matches involving this player (oldest first for chronological display)
  const playerMatches = allMatchesSorted.filter(m =>
    !m.deleted && (m.match_placements||[]).some(p => p.player_id === playerId)
  );

  const matchCards = playerMatches.map(match => {
    const pl       = (match.match_placements||[]).sort((a,b) => a.position - b.position);
    const myP      = pl.find(p => p.player_id === playerId);
    if (!myP) return '';

    const earned   = matchBreakdowns[match.id]?.[playerId];
    if (!earned) return '';

    const sport    = match.sport;
    const sportKey = sport.toLowerCase();
    const sportPts = round2(earned[sportKey] || 0);
    const bonus    = round2(earned.bonus    || 0);
    const underdog = round2(earned.underdog || 0);
    const total    = round2(sportPts + bonus + underdog);
    if (total === 0 && earned.wins === 0) return '';

    const others = pl.filter(p => p.player_id !== playerId).map(p => p.players?.name).filter(Boolean);

    // Work out base pts to show the multiplier effect
    const didWin  = myP.is_winner === true || (myP.is_winner === null && myP.position === 1);
    const is2nd   = !didWin && myP.position === 2 && sport !== 'Pool';
    const basePts = didWin
      ? (sport === 'Pool' ? cfg.poolWinPts : cfg.firstPts)
      : is2nd ? cfg.secondPts : 0;

    const lines = [];
    if (didWin) {
      lines.push({ label: `${sport} ${sport==='Pool'?'win':'1st place'} — base`, val: fmtPts(basePts) });
      const upsetBonus = round2(sportPts - basePts - underdog);
      if (upsetBonus > 0.01) lines.push({ label: `Upset bonus`, val: '+' + fmtPts(upsetBonus), pos: true });
    } else if (is2nd) {
      lines.push({ label: `${sport} 2nd place`, val: fmtPts(cfg.secondPts) });
    } else {
      lines.push({ label: `No points earned this match`, val: '0' });
    }
    if (underdog > 0) lines.push({ label: `Underdog ×${cfg.underdogMultiplier}`, val: '+' + fmtPts(underdog), pos: true });
    if (bonus > 0)    lines.push({ label: `Bonus (king slay / upset)`, val: '+' + fmtPts(bonus), pos: true });

    const linesHtml = lines.map(l =>
      `<div class="breakdown-calc-row">
        <span>${l.label}</span>
        <span class="${l.pos?'pos':''}">${l.val}</span>
      </div>`
    ).join('');

    return `
      <div class="match-breakdown-item" onclick="this.classList.toggle('expanded')">
        <div class="match-breakdown-top">
          <div class="match-sport-badge ${sport.toLowerCase()}" style="flex-shrink:0">${SPORT_EMOJI[sport]||'🎯'}</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;font-size:14px">${sport}${match.pool_mode?' · '+match.pool_mode:''}</div>
            <div style="font-size:12px;color:var(--muted)">
              Wk ${match.week} · ${fmtDate(match.match_date||match.created_at)}
              ${others.length ? '· vs ' + others.join(', ') : ''}
            </div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-family:var(--font-display);font-size:20px;color:var(--accent-dark)">
              ${total > 0 ? '+' + fmtPts(total) : '—'}
            </div>
            <div style="font-size:11px;color:var(--muted)">pts</div>
          </div>
        </div>
        <div class="match-breakdown-detail">
          ${linesHtml}
          <div class="breakdown-calc-row total">
            <span>Match total</span><span>${fmtPts(total)} pts</span>
          </div>
          <div style="font-size:11px;color:var(--muted);margin-top:8px">Tap to collapse</div>
        </div>
      </div>`;
  }).filter(Boolean).join('');

  content.innerHTML = `
    <div class="breakdown-header">
      <div class="breakdown-stat">
        <div class="breakdown-stat-val">${fmtPts(totalPts)}</div>
        <div class="breakdown-stat-label">Total Pts</div>
      </div>
      <div class="breakdown-stat">
        <div class="breakdown-stat-val">${poolWins + bowlWins + golfWins}</div>
        <div class="breakdown-stat-label">Total Wins</div>
      </div>
      <div class="breakdown-stat">
        <div class="breakdown-stat-val">${poolWins}</div>
        <div class="breakdown-stat-label">🎱 Pool</div>
      </div>
      <div class="breakdown-stat">
        <div class="breakdown-stat-val">${bowlWins}</div>
        <div class="breakdown-stat-label">🎳 Bowling</div>
      </div>
      <div class="breakdown-stat">
        <div class="breakdown-stat-val">${golfWins}</div>
        <div class="breakdown-stat-label">⛳ Golf</div>
      </div>
      <div class="breakdown-stat">
        <div class="breakdown-stat-val">${fmtPts(bonusPts)}</div>
        <div class="breakdown-stat-label">Bonus Pts</div>
      </div>
      <div class="breakdown-stat">
        <div class="breakdown-stat-val">${fmtPts(dogPts)}</div>
        <div class="breakdown-stat-label">Underdog</div>
      </div>
    </div>
    <div class="section-label">Match by Match</div>
    ${playerMatches.length && matchCards
      ? matchCards
      : '<div class="empty"><div class="empty-icon">🎯</div><div class="empty-text">No matches yet</div></div>'
    }`;
}

async function init() {
  try {
    const [cfgData, season, players] = await Promise.all([
      DB.getConfig(), DB.getActiveSeason(), DB.getPlayers()
    ]);
    cfg = cfgData; activeSeason = season; allPlayers = players;

    const [szn, allM] = await Promise.all([
      DB.getSeasonStandings(season.id),
      DB.getAllMatchesAsc(season.id),
    ]);
    seasonStandings  = szn;
    allMatchesSorted = allM;

    // Replay all matches through engine for accurate per-match breakdowns
    replayAllMatches();

    // Build player tabs
    const tabBar = document.getElementById('player-tabs');
    tabBar.innerHTML = players.map(p => {
      const ph = p.photo_url
        ? `<div class="tab-avatar"><img src="${p.photo_url}" onerror="this.parentNode.innerHTML='${initials(p.name)}'"></div>`
        : `<div class="tab-avatar">${initials(p.name)}</div>`;
      return `<button class="player-tab" data-id="${p.id}">${ph}${p.name}</button>`;
    }).join('');

    tabBar.addEventListener('click', e => {
      const tab = e.target.closest('.player-tab');
      if (!tab) return;
      tabBar.querySelectorAll('.player-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      activePlayerId = tab.dataset.id;
      buildBreakdownForPlayer(activePlayerId);
    });

    if (players.length) {
      activePlayerId = players[0].id;
      tabBar.querySelector('.player-tab')?.classList.add('active');
      buildBreakdownForPlayer(activePlayerId);
    }

    document.getElementById('loader').classList.add('hidden');
    const main = document.getElementById('main');
    main.style.opacity = '1'; main.style.transition = 'opacity 0.4s';
  } catch (err) {
    document.getElementById('loader').innerHTML =
      `<div style="text-align:center;padding:40px"><div style="font-size:32px">⚠️</div><div style="margin-top:12px">${err.message}</div></div>`;
  }
}

init();
document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') init(); });
</script>
</body>
