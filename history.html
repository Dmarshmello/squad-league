<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Match History — Squad League</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="loading-screen" id="loader">
  <div class="loading-logo">SQUAD<span>LEAGUE</span></div>
  <div class="loading-bar"><div class="loading-bar-fill"></div></div>
</div>

<nav class="nav">
  <a class="nav-logo" href="index.html">SQUAD<span>LEAGUE</span></a>
  <div class="nav-links">
    <a class="nav-link" href="index.html">Dashboard</a>
    <a class="nav-link" href="breakdown.html">Breakdown</a>
    <a class="nav-link active" href="history.html">History</a>
    <a class="nav-link" href="rules.html">Rules</a>
    <a class="nav-link" href="settings.html">Settings</a>
  </div>
  <a class="nav-submit" href="submit.html">+ Submit Match</a>
</nav>

<main class="page" id="main" style="opacity:0">
  <div class="page-title">Match <span>History</span></div>
  <div class="page-subtitle">Click any match to see details</div>

  <div class="filter-bar" id="sport-filter">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="Pool">🎱 Pool</button>
    <button class="filter-btn" data-filter="Bowling">🎳 Bowling</button>
    <button class="filter-btn" data-filter="Golf">⛳ Golf</button>
    <button class="filter-btn" data-filter="deleted" style="margin-left:auto">🗑 Deleted</button>
  </div>
  <div class="filter-bar" id="player-filter"></div>
  <div id="matches-container"></div>
</main>

<!-- MATCH MODAL -->
<div class="modal-overlay hidden" id="modal-overlay">
  <div class="modal">
    <button class="modal-close" id="modal-close">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<footer class="site-footer">Developed by <span>Dmarshmello</span></footer>

<nav class="nav-mobile-links">
  <a class="nav-mobile-link" href="index.html"><span class="mob-icon">🏆</span>Dashboard</a>
  <a class="nav-mobile-link" href="breakdown.html"><span class="mob-icon">📊</span>Breakdown</a>
  <a class="nav-mobile-link active" href="history.html"><span class="mob-icon">📋</span>History</a>
  <a class="nav-mobile-link" href="settings.html"><span class="mob-icon">⚙️</span>Settings</a>
  <a class="nav-mobile-link" href="submit.html"><span class="mob-icon">➕</span>Submit</a>
</nav>

<div class="toast-container" id="toasts"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script src="js/engine.js"></script>
<script>

let allMatches = [], allPlayers = [], activeSeason = null;
let activeFilter = 'all', activePlayer = 'all', showDeleted = false;

function renderMatches() {
  const container = document.getElementById('matches-container');
  let filtered = allMatches;

  if (activeFilter === 'deleted') {
    filtered = filtered.filter(m => m.deleted);
  } else {
    filtered = filtered.filter(m => !m.deleted);
    if (activeFilter !== 'all') filtered = filtered.filter(m => m.sport === activeFilter);
  }
  if (activePlayer !== 'all') {
    filtered = filtered.filter(m =>
      (m.match_placements||[]).some(p => p.players?.name === activePlayer)
    );
  }

  if (!filtered.length) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">🎯</div><div class="empty-text">No matches found</div></div>';
    return;
  }

  // Group by week
  const byWeek = {};
  filtered.forEach(m => {
    const w = m.week || '?';
    if (!byWeek[w]) byWeek[w] = [];
    byWeek[w].push(m);
  });

  const weeks = Object.keys(byWeek).sort((a, b) => b - a);
  container.innerHTML = weeks.map(week => {
    const rows = byWeek[week].map(m => {
      const pl      = (m.match_placements||[]).sort((a,b) => a.position - b.position);
      const winners = pl.filter(p => p.is_winner === true || p.position === 1);
      const winner  = pl[0]?.players?.name || '?';
      const others  = pl.slice(1).map(p => p.players?.name).filter(Boolean).join(', ');
      const sport   = m.sport || '';
      return `
        <div class="match-item ${m.deleted ? 'deleted' : ''}" data-id="${m.id}" style="cursor:pointer">
          <div class="match-sport-badge ${sport.toLowerCase()}">${SPORT_EMOJI[sport]||'🎯'}</div>
          <div class="match-info">
            <div class="match-winner">
              ${winner}
              ${m.deleted ? '<span class="deleted-badge">Deleted</span>' : ''}
            </div>
            <div class="match-detail">${sport}${m.pool_mode?' · '+m.pool_mode:''} ${others?'· vs '+others:''}</div>
          </div>
          <div class="match-right">
            <div class="match-week">Wk ${m.week}</div>
            <div class="match-date">${fmtDate(m.match_date || m.created_at)}</div>
          </div>
        </div>`;
    }).join('');
    return `<div style="margin-bottom:28px">
      <div class="section-label">Week ${week}</div>
      <div class="match-list">${rows}</div>
    </div>`;
  }).join('');

  container.querySelectorAll('.match-item').forEach(el => {
    el.addEventListener('click', () => openModal(el.dataset.id));
  });
}

function openModal(matchId) {
  const match = allMatches.find(m => m.id === matchId);
  if (!match) return;
  const pl    = (match.match_placements||[]).sort((a,b) => a.position - b.position);
  const sport = match.sport || '';

  const posLabel = (p, i) => {
    if (sport === 'Pool') {
      if (p.is_winner === true)  return 'Winner';
      if (p.is_winner === false) return 'Loser';
      return p.position === 1 ? 'Winner' : 'Loser';
    }
    return ['1st','2nd','3rd','4th','5th','6th'][i] || `${i+1}th`;
  };

  const playersHtml = pl.map((p, i) => `
    <div class="modal-player-row">
      <div class="modal-pos ${i===0?'p1':i===1?'p2':''}">${i+1}</div>
      ${avatarHtml(p.players||{name:'?'})}
      <div>
        <div class="modal-pname">${p.players?.name||'?'}</div>
        <div style="font-size:12px;color:var(--muted)">${posLabel(p,i)}</div>
      </div>
    </div>`).join('');

  document.getElementById('modal-content').innerHTML = `
    <div style="font-size:28px;margin-bottom:8px">${SPORT_EMOJI[sport]||'🎯'}</div>
    <div class="modal-title">${sport}${match.pool_mode?' — '+match.pool_mode:''}</div>
    <div class="modal-meta">Week ${match.week} &nbsp;·&nbsp; ${fmtDate(match.match_date||match.created_at)}</div>
    ${match.deleted ? '<div class="deleted-banner">⚠️ This match is deleted — its points have been removed.</div>' : ''}
    <div class="modal-players">${playersHtml}</div>
    ${match.notes ? `<div class="modal-notes">📝 ${match.notes}</div>` : ''}
    <div class="btn-row">
      ${match.deleted
        ? `<button class="btn btn-secondary btn-full" id="modal-restore">↩ Restore Match</button>`
        : `<button class="btn btn-full" style="background:rgba(239,68,68,0.1);color:#991b1b;border:1px solid rgba(239,68,68,0.2)" id="modal-delete">🗑 Delete Match</button>`
      }
    </div>`;

  document.getElementById('modal-overlay').classList.remove('hidden');

  if (match.deleted) {
    document.getElementById('modal-restore').addEventListener('click', () => restoreMatch(matchId));
  } else {
    document.getElementById('modal-delete').addEventListener('click', () => {
      if (!confirm('Delete this match? It stays visible in history but its points are removed.')) return;
      deleteMatch(matchId);
    });
  }
}

function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

async function deleteMatch(matchId) {
  try {
    await DB.softDeleteMatch(matchId);
    const m = allMatches.find(m => m.id === matchId);
    if (m) m.deleted = true;
    closeModal();
    showToast('Recalculating points...', '');
    const all = await DB.getAllMatchesAsc(activeSeason.id);
    const cfg = await DB.getConfig();
    await Engine.fullRecalc(activeSeason.id, all, allPlayers, cfg);
    renderMatches();
    showToast('Match deleted and points recalculated', 'success');
  } catch (err) { showToast('Error: ' + err.message, 'error'); }
}

async function restoreMatch(matchId) {
  try {
    await DB.restoreMatch(matchId);
    const m = allMatches.find(m => m.id === matchId);
    if (m) m.deleted = false;
    closeModal();
    showToast('Recalculating points...', '');
    const all = await DB.getAllMatchesAsc(activeSeason.id);
    const cfg = await DB.getConfig();
    await Engine.fullRecalc(activeSeason.id, all, allPlayers, cfg);
    renderMatches();
    showToast('Match restored and points recalculated', 'success');
  } catch (err) { showToast('Error: ' + err.message, 'error'); }
}

document.getElementById('sport-filter').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('#sport-filter .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.filter;
  renderMatches();
});

async function init() {
  try {
    const [season, players] = await Promise.all([DB.getActiveSeason(), DB.getPlayers()]);
    activeSeason = season; allPlayers = players;
    allMatches   = await DB.getAllMatchesDesc(season.id);

    const pfBar = document.getElementById('player-filter');
    pfBar.innerHTML = `<button class="filter-btn active" data-player="all">All Players</button>` +
      players.map(p => `<button class="filter-btn" data-player="${p.name}">${p.name}</button>`).join('');
    pfBar.addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn || !btn.dataset.player) return;
      pfBar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activePlayer = btn.dataset.player;
      renderMatches();
    });

    renderMatches();
    document.getElementById('loader').classList.add('hidden');
    const main = document.getElementById('main');
    main.style.opacity = '1'; main.style.transition = 'opacity 0.4s';
  } catch (err) {
    document.getElementById('loader').innerHTML =
      `<div style="text-align:center;padding:40px"><div style="font-size:32px">⚠️</div><div style="margin-top:12px">${err.message}</div></div>`;
  }
}
init();
document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') init(); });
</script>
</body>
</html>
